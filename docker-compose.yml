version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"

  app:
    build: .
    container_name: energy_app
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env